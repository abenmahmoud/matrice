          in: path
          required: true
          schema:
            type: string
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [matrix, emotional-core, hpsa, book-outline, manuscript, screenplay, pitch, complete]
      responses:
        "200":
          description: Export data
          content:
            application/json:
              schema:
