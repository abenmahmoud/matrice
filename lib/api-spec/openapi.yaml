components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Project:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        rawIdea:
          type: string
        inputType:
          type: string
        genre:
          type: string
        tone:
          type: string
        targetFormat:
          type: string
        temporalLogic:
          type: string
        realityLevel:
          type: string
        targetAudience:
          type: string
        artisticAmbition:
          type: string
        inspirationSources:
          type: string
        cinematicReferences:
          type: string
        manuscriptExcerpt:
          type: string
        visualMoods:
          type: array
          items:
            type: string
        progression:
          type: number
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - title
        - rawIdea
        - genre
        - tone
        - targetFormat
        - progression
        - createdAt
        - updatedAt

    ProjectDetail:
      allOf:
        - $ref: "#/components/schemas/Project"
        - type: object
          properties:
            matrix:
              $ref: "#/components/schemas/NarrativeMatrix"
            emotionalCore:
              $ref: "#/components/schemas/EmotionalCore"
            characters:
              type: array
              items:
                $ref: "#/components/schemas/Character"

    CreateProjectInput:
      type: object
      properties:
        title:
          type: string
        rawIdea:
          type: string
        inputType:
          type: string
        genre:
          type: string
        tone:
          type: string
        targetFormat:
          type: string
        temporalLogic:
          type: string
        realityLevel:
          type: string
        targetAudience:
          type: string
        artisticAmbition:
          type: string
        inspirationSources:
          type: string
        cinematicReferences:
          type: string
        manuscriptExcerpt:
          type: string
        visualMoods:
          type: array
          items:
            type: string
      required:
        - title
        - rawIdea
        - genre
        - tone
        - targetFormat

    UpdateProjectInput:
      type: object
      properties:
        title:
          type: string
        rawIdea:
          type: string
        inputType:
          type: string
        genre:
          type: string
        tone:
          type: string
        targetFormat:
          type: string
        temporalLogic:
          type: string
        realityLevel:
          type: string
        targetAudience:
          type: string
        artisticAmbition:
          type: string

    DashboardSummary:
      type: object
      properties:
        totalProjects:
          type: integer
        byGenre:
          type: array
          items:
            type: object
            properties:
              genre:
                type: string
              count:
                type: integer
            required: [genre, count]
        byFormat:
          type: array
          items:
            type: object
            properties:
              format:
                type: string
              count:
                type: integer
            required: [format, count]
        recentProjects:
          type: array
          items:
            $ref: "#/components/schemas/Project"
        averageProgression:
          type: number
      required:
        - totalProjects
        - byGenre
        - byFormat
        - recentProjects
        - averageProgression

    NarrativeMatrix:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        centralConcept:
          type: string
        logline:
          type: string
        shortPitch:
          type: string
        longSynopsis:
          type: string
        genre:
          type: string
        tone:
          type: string
        themes:
          type: array
          items:
            type: string
        universeLaws:
          type: array
          items:
            type: string
        temporalRules:
          type: string
        spatialRules:
          type: string
        visibleWorld:
          type: string
        invisibleForces:
          type: string
        centralConflict:
          type: string
        protagonist:
          type: string
        antagonist:
          type: string
        emotionalStakes:
          type: string
        symbolicMotifs:
          type: array
          items:
            type: string
        powerObjects:
          type: array
          items:
            type: string
        secrets:
          type: array
          items:
            type: string
        possibleEndings:
          type: array
          items:
            type: string
        coherenceRules:
          type: array
          items:
            type: string
        updatedAt:
          type: string
      required:
        - projectId
        - centralConcept
        - logline
        - shortPitch
        - longSynopsis

    CoherenceCheck:
      type: object
      properties:
        score:
          type: integer
        issues:
          type: array
          items:
            type: string
        suggestions:
          type: array
          items:
            type: string
        isCoherent:
          type: boolean
      required:
        - score
        - issues
        - suggestions
        - isCoherent

    EmotionalCore:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        dominantEmotion:
          type: string
        hiddenWound:
          type: string
        emotionalLack:
          type: string
        innerChildSignal:
          type: string
        protectionMask:
          type: string
        apparentDesire:
          type: string
        deepNeed:
          type: string
        centralFear:
          type: string
        shamePoint:
          type: string
        guiltyPoint:
          type: string
        symbolicObject:
          type: string
