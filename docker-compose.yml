services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: matrice
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: matrice_narrative
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matrice -d matrice_narrative"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports:
      - "${API_HOST_BIND:-127.0.0.1}:${API_HOST_PORT:-8090}:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgres://matrice:${POSTGRES_PASSWORD}@postgres:5432/matrice_narrative
      SESSION_SECRET: ${SESSION_SECRET}
      CRON_SECRET: ${CRON_SECRET:-}
      AI_INTEGRATIONS_OPENAI_BASE_URL: ${AI_INTEGRATIONS_OPENAI_BASE_URL}
      AI_INTEGRATIONS_OPENAI_API_KEY: ${AI_INTEGRATIONS_OPENAI_API_KEY}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      AI_MODEL: ${AI_MODEL:-gpt-4o}
      AI_MODEL_FREE: ${AI_MODEL_FREE:-gpt-4o-mini}
      AI_MODEL_PRO: ${AI_MODEL_PRO:-gpt-4o}
      AI_MODEL_STUDIO: ${AI_MODEL_STUDIO:-gpt-4o}
      AI_MODEL_ENTERPRISE: ${AI_MODEL_ENTERPRISE:-gpt-4o}
      AI_MODEL_OVERRIDE_OWNER: ${AI_MODEL_OVERRIDE_OWNER:-gpt-4o}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      LENTILLE_DEEPSEEK_MAX_TOKENS: ${LENTILLE_DEEPSEEK_MAX_TOKENS:-4000}
      LENTILLE_DEEPSEEK_TEMPERATURE: ${LENTILLE_DEEPSEEK_TEMPERATURE:-0.7}
      ESSUF_SIGN_API_KEY: ${ESSUF_SIGN_API_KEY:-}
      ESSUF_SIGN_BASE_URL: ${ESSUF_SIGN_BASE_URL:-https://sign.essuf.fr}
      ESSUF_SIGN_WEBHOOK_SECRET: ${ESSUF_SIGN_WEBHOOK_SECRET:-}
      ESSUF_SIRET: ${ESSUF_SIRET:-}
      ESSUF_ADDRESS: ${ESSUF_ADDRESS:-}
      MATRICE_BASE_URL: ${MATRICE_BASE_URL:-https://matrice.essuf.fr}
      MATRICE_PRODUCT_MODE: ${MATRICE_PRODUCT_MODE:-commercial}
      MATRICE_DEFAULT_PLAN: ${MATRICE_DEFAULT_PLAN:-free}
      MATRICE_FREE_PROJECT_LIMIT: ${MATRICE_FREE_PROJECT_LIMIT:-1}
      MATRICE_FREE_PROGRESSION_CAP: ${MATRICE_FREE_PROGRESSION_CAP:-35}
      MATRICE_FREE_GENERATION_LIMIT: ${MATRICE_FREE_GENERATION_LIMIT:-2}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MATRICE_EMAIL_FROM: ${MATRICE_EMAIL_FROM:-Matrice <no-reply@essuf.fr>}
      MATRICE_PUBLIC_BASE_URL: ${MATRICE_PUBLIC_BASE_URL:-https://matrice.essuf.fr}
      MATRICE_FROM_EMAIL: ${MATRICE_FROM_EMAIL:-no-reply@essuf.fr}
      MATRICE_FROM_NAME: ${MATRICE_FROM_NAME:-Matrice}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_STUDIO: ${STRIPE_PRICE_STUDIO:-}
      STRIPE_PRICE_PUBLISH: ${STRIPE_PRICE_PUBLISH:-}
      STRIPE_PRICE_STUDIO_MONTHLY: ${STRIPE_PRICE_STUDIO_MONTHLY:-}
      STRIPE_PRICE_STUDIO_YEARLY: ${STRIPE_PRICE_STUDIO_YEARLY:-}
      STRIPE_PRICE_PREMIUM_MONTHLY: ${STRIPE_PRICE_PREMIUM_MONTHLY:-}
      STRIPE_PRICE_PREMIUM_YEARLY: ${STRIPE_PRICE_PREMIUM_YEARLY:-}
      STRIPE_PRICE_CREDITS_100: ${STRIPE_PRICE_CREDITS_100:-}
      STRIPE_PRICE_CREDITS_300: ${STRIPE_PRICE_CREDITS_300:-}
      STRIPE_PRICE_CREDITS_1000: ${STRIPE_PRICE_CREDITS_1000:-}
      OTS_CALENDARS: ${OTS_CALENDARS:-}
      OTS_ESPLORA_URL: ${OTS_ESPLORA_URL:-https://blockstream.info/api}
      OTS_ESPLORA_TIMEOUT_MS: ${OTS_ESPLORA_TIMEOUT_MS:-5000}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_BIND:-127.0.0.1}:${FRONTEND_HOST_PORT:-8091}:80"
    environment:
      API_URL: http://api:8080
    depends_on:
      - api

  essuf-portal:
    build:
      context: .
      dockerfile: artifacts/essuf-portal/Dockerfile
    restart: unless-stopped
    ports:
      - "${ESSUF_PORTAL_HOST_BIND:-127.0.0.1}:${ESSUF_PORTAL_HOST_PORT:-8092}:80"

volumes:
  postgres_data:
