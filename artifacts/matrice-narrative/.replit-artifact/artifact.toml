kind = "web"
previewPath = "/"
title = "Matrice Narrative"
version = "1.0.0"
id = "artifacts/matrice-narrative"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22845

[services.development]
run = "pnpm --filter @workspace/matrice-narrative run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/matrice-narrative", "run", "build" ]
publicDir = "artifacts/matrice-narrative/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22845"
BASE_PATH = "/"
