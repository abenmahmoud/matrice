name: CI

on:
  pull_request:
  push:
    branches:
      - codex/publish-phase1-roman-sprint-c

jobs:
  validate:
    name: Typecheck, tests, e2e, builds
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.33.2"
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm test

      - name: E2E route smoke
        run: pnpm test:e2e

      - name: Frontend build
        run: pnpm --filter @workspace/matrice-narrative run build
        env:
          PORT: "3000"
          BASE_PATH: /
          NODE_ENV: production

      - name: API build
        run: pnpm --filter @workspace/api-server run build
