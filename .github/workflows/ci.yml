name: CI

on:
  pull_request:
  push:
    branches:
      - codex/publish-phase1-roman-sprint-c

jobs:
  validate:
    name: Typecheck, tests, e2e, builds
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: corepack pnpm exec playwright install --with-deps chromium

      - name: Typecheck
        run: corepack pnpm run typecheck

      - name: Unit tests
        run: corepack pnpm test

      - name: E2E route smoke
        run: corepack pnpm test:e2e

      - name: Frontend build
        run: corepack pnpm --filter @workspace/matrice-narrative run build
        env:
          PORT: "3000"
          BASE_PATH: /
          NODE_ENV: production

      - name: API build
        run: corepack pnpm --filter @workspace/api-server run build
